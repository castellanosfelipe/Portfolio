<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>OG image 1200x630 · felipepena.co</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;1,6..72,300&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{width:1200px;height:630px;background:#17141c;overflow:hidden;position:relative;font-family:'Newsreader',Georgia,serif;}
  .halo{position:absolute;right:-180px;top:-180px;width:640px;height:640px;border-radius:50%;background:radial-gradient(circle, rgba(91,75,214,0.35), rgba(91,75,214,0));}
  .ring{position:absolute;right:70px;bottom:-90px;width:420px;height:420px;border:1px solid rgba(139,124,246,0.35);border-radius:50%;}
  .wrap{position:relative;z-index:2;padding:84px 90px;height:100%;display:flex;flex-direction:column;justify-content:space-between;}
  .overline{font-family:'IBM Plex Mono',monospace;font-size:19px;letter-spacing:0.22em;text-transform:uppercase;color:#8b7cf6;}
  h1{font-weight:300;font-size:70px;line-height:1.1;letter-spacing:-0.015em;color:#fff;max-width:730px;}
  h1 em{font-style:italic;color:#b9b1e4;}
  .foot{display:flex;justify-content:space-between;align-items:baseline;}
  .name{font-size:34px;color:#e8e5f2;}
  .url{font-family:'IBM Plex Mono',monospace;font-size:21px;color:#8079a0;letter-spacing:0.06em;}
  .avatar{position:absolute;right:90px;top:50%;transform:translateY(-58%);width:230px;height:230px;border-radius:50%;overflow:hidden;border:1.5px solid #5b4bd6;}
  .avatar img{width:100%;height:100%;object-fit:cover;display:block;}
</style>
</head>
<body>
  <div class="halo"></div>
  <div class="ring"></div>
  <div class="avatar"><img src="../avatar-felipe-memoji.webp" alt=""></div>
  <div class="wrap">
    <div class="overline">Growth Product Manager · SaaS B2B / B2G</div>
    <h1>El crecimiento no se hackea.<br><em>Se compone.</em></h1>
    <div class="foot">
      <span class="name">Felipe Peña</span>
      <span class="url">felipepena.co</span>
    </div>
  </div>
</body>
</html>
